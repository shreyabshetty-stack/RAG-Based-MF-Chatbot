name: Daily Mutual Fund Ingestion

on:
  schedule:
    # Run every day at 10:30 AM IST (5:00 AM UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:
    # Allow manual triggering of the workflow from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ingestion Script (Scraper)
        run: python scripts/ingest.py

      - name: Run Chunking & Vector DB Update
        run: python scripts/chunk_and_embed.py

      - name: Commit and push updated corpus & vector store
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update mutual fund data and vector store [skip ci]" && git push)
